<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPGA实验教学系统</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏫 FPGA实验教学系统</h1>
            <p class="subtitle">网络化实验板卡状态监测与数据采集平台</p>
        </header>
        
        <main class="main-content">
            <div class="welcome-card">
                <div class="welcome-icon">🔧</div>
                <h2>欢迎使用FPGA实验教学系统</h2>
                <p>实时监控板卡状态、采集实验数据、可视化展示结果</p>
                
                <div class="features">
                    <div class="feature">
                        <span class="feature-icon">📡</span>
                        <h3>实时数据采集</h3>
                        <p>通过Wi-Fi实时采集板卡数据</p>
                    </div>
                    <div class="feature">
                        <span class="feature-icon">👁️</span>
                        <h3>可视化展示</h3>
                        <p>LED、开关、数码管状态实时可视化</p>
                    </div>
                    <div class="feature">
                        <span class="feature-icon">📊</span>
                        <h3>数据分析</h3>
                        <p>实验数据统计分析</p>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <a href="login.html" class="btn btn-primary">登录系统</a>
                    <a href="register.html" class="btn btn-secondary">注册账号</a>
                </div>
            </div>
        </main>
        
    </div>
</body>
</html>
