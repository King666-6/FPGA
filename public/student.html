<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPGA实验数据采集 - 实时显示</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/student-dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="logo"></span>
                <span>FPGA实验数据采集系统</span>
            </div>
            <div class="nav-user">
                <span id="userName">FPGA采集</span>
                <button id="logoutBtn" class="btn btn-small">刷新</button>
            </div>
        </div>
    </nav>

    <div class="f-layout">
        <div class="f-topbar">
            <div class="f-controls">
                <select id="experimentSelect" class="experiment-select" disabled>
                    <option value="">-- 自由采集模式（无实验）--</option>
                </select>
                <button id="connectBtn" class="btn btn-primary">开始连接</button>
                <button id="startCaptureBtn" class="btn btn-success" disabled>开始采集</button>
                <button id="customCaptureBtn" class="btn btn-info" disabled>自定义采集</button>
                <button id="pauseCaptureBtn" class="btn btn-warning" disabled>暂停采集</button>
                <button id="startRecordBtn" class="btn btn-warning" disabled>⏺ 开始记录</button>
                <button id="submitWaveformBtn" class="btn btn-success" hidden>提交波形</button>
                <button id="disconnectBtn" class="btn btn-danger" disabled>断开连接</button>
            </div>
            <div class="f-info">
                <span>🚀 TCP连接: 自动检测 | 通道数: 动态</span>
            </div>
        </div>

        <div class="f-main">
            <div class="fpga-board-container">
                <img src="image/board-bg.png " class="board-bg-img" alt="FPGA Board">
                <div class="board-components-layer">
                    <div id="digit-container" class="absolute-layer"></div>
                    <div id="led-container" class="absolute-layer"></div>
                    <div id="switch-container" class="absolute-layer"></div>
                    <div id="buzzer-container" class="absolute-layer"></div>
                    <div id="btn-container" class="absolute-layer"></div>
                </div>
            </div>

            <section class="f-analyzer" style="min-height: 200px;">
                <h3 class="f-section-title">实时逻辑波形分析</h3>
                <div id="waveform-filters" class="waveform-filters"></div>
                <div class="f-canvas-container">
                    <canvas id="waveformCanvas"></canvas>
                </div>
            </section>
        </div>

        <div class="f-bottom">
            <div class="f-controls">
                <span>💡 完成连接自动接收数据</span>
            </div>
        </div>
    </div>

    <div class="connection-status">
        <span class="ws-dot" id="wsDot"></span>
        <span id="wsStatus">WebSocket连接中...</span>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/student.js"></script>
    <style>
        .experiment-select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            font-size: 14px;
            min-width: 200px;
            cursor: pointer;
        }
        .experiment-select:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-content {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .channel-group {
            margin-bottom: 15px;
        }
        .channel-group h4 {
            margin: 10px 0 8px;
            font-size: 14px;
            color: #666;
        }
        .channel-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .channel-label {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #f5f5f5;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .channel-label:hover {
            background: #e8e8e8;
        }
        .channel-label.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .channel-label input {
            cursor: pointer;
        }
        .modal-footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .selected-count {
            margin-left: auto;
            font-size: 14px;
            color: #666;
        }
        .selected-count span {
            color: #2196F3;
            font-weight: bold;
        }
        .f-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        .f-buttons .btn-indep {
            width: 50px;
            height: 30px;
            background: #444;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 11px;
            border: 2px solid #666;
        }
        .f-buttons .btn-indep.on {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        .f-matrix {
            margin: 10px 0;
        }
        .f-matrix-grid {
            display: grid;
            grid-template-columns: auto repeat(4, 25px);
            gap: 4px;
            font-size: 10px;
        }
        .f-matrix-grid .matrix-label {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 9px;
        }
        .f-matrix-grid .matrix-cell {
            width: 25px;
            height: 20px;
            background: #333;
            border-radius: 2px;
        }
        .f-matrix-grid .matrix-cell.on {
            background: #FF9800;
        }
        .f-buzzer {
            margin: 10px 0;
        }
        .f-buzzer .buzzer-icon {
            width: 40px;
            height: 40px;
            background: #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 2px solid #666;
        }
        .f-buzzer .buzzer-icon.on {
            background: #f44336;
            border-color: #f44336;
            animation: buzzer-pulse 0.3s infinite;
        }
        @keyframes buzzer-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>

    <div id="customCaptureModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">选择采集通道 (最多64个)</div>
            
            <div class="channel-group">
                <h4>按键区</h4>
                <div id="keypadChannels" class="channel-options"></div>
            </div>
            
            <div class="channel-group">
                <h4>LED区</h4>
                <div id="ledChannels" class="channel-options"></div>
            </div>
            
            <div class="channel-group">
                <h4>开关区</h4>
                <div id="switchChannels" class="channel-options"></div>
            </div>
            
            <div class="channel-group">
                <h4>数码管区</h4>
                <div id="digitChannels" class="channel-options"></div>
            </div>
            
            <div class="channel-group">
                <h4>独立按键区</h4>
                <div id="btnChannels" class="channel-options"></div>
            </div>
            
            <div class="channel-group">
                <h4>蜂鸣器区</h4>
                <div id="buzzerChannels" class="channel-options"></div>
            </div>
            
            <div class="modal-footer">
                <span class="selected-count">已选择: <span id="selectedCount">0</span>/64</span>
                <button id="cancelCaptureBtn" class="btn btn-small">取消</button>
                <button id="confirmCaptureBtn" class="btn btn-primary btn-small">确认采集</button>
            </div>
        </div>
    </div>
</body>
</html>
